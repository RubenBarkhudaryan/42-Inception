version: "5.1.4"

services:
    webserver:
        build: ./requirements/nginx
        container_name: webserver
        volumes:
            - wordpress_data:/var/www/
        networks:
            - inception
        ports:
            - "443:443"
        env_file:
            - .env
        depends_on:
            - wordpress
        restart: always

    database:
        build: ./requirements/mariadb
        container_name: database
        volumes:
            - db_data:/var/lib/mysql/
        secrets:
            - db_password
            - db_root_password
        environment:
            - MYSQL_USER=wordpress
            - MYSQL_DATABASE=wordpress
        networks:
            - inception
        ports:
            - "3306:3306"
        restart: always

    wordpress:
        build: ./requirements/wordpress
        container_name: wordpress
        volumes:
            - wordpress_data:/var/www/
        secrets:
            - db_password
            - wordpress_root_password
            - wordpress_user_password
        env_file:
            - .env
        networks:
            - inception
        ports:
            - "9000:9000"
        depends_on:
            - database
        restart: always

volumes:
    db_data:
        driver_opts:
            o: bind
            type: none
            device: /home/rub/data/wordpress
    wordpress_data:
        driver_opts:
            o: bind
            type: none
            device: /home/rub/data/mariadb

networks:
    inception:
        driver: bridge
        name: inception

secrets:
    db_password:
        file: ../secrets/db_password.txt
    db_root_password:
        file: ../secrets/db_root_password.txt
    wordpress_root_password:
        file: ../secrets/wordpress_root_password.txt
    wordpress_user_password:
        file: ../secrets/wordpress_user_password.txt
