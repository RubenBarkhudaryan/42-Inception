version: "5.1.4"

services:
    webserver:
        build: ./requirements/nginx
        container_name: webserver
        volumes:
            - wordpress_data:/var/www/html
        networks:
            - inception
        ports:
            - "443:443"
        depends_on:
            - wordpress
        restart: on-failure

    database:
        build: ./requirements/mariadb
        container_name: database
        volumes:
            - db_data:/var/lib/mysql
        secrets:
            - db_password
            - db_root_password
        environment:
            - MYSQL_USER=wordpress
            - MYSQL_DATABASE=wordpress
            - MYSQL_PASSWORD_FILE=/run/secrets/db_password
            - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_password
        networks:
            - inception
        ports:
            - "3306:3306"
        restart: on-failure

    wordpress:
        build: ./requirements/wordpress
        container_name: wordpress
        volumes:
            - wordpress_data:/var/www/html
        secrets:
            - db_password
        environment:
            - MYSQL_PASSWORD_FILE=/run/secrets/db_password
        env_file:
            - .env
        networks:
            - inception
        ports:
            - "9000:9000"
        depends_on:
            - database
        restart: on-failure

volumes:
    db_data:
    wordpress_data:

networks:
    inception:
        driver: bridge
        name: inception

secrets:
    db_password:
        file: /home/rub/Desktop/42-Inception/secrets/db_password.txt
    db_root_password:
        file: /home/rub/Desktop/42-Inception/secrets/db_root_password.txt